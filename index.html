<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="nav-inner">
      <button class="nav-link active" onclick="showSection('home')">HOME</button>
      <button class="nav-link" onclick="showSection('portfolio')">PORTFOLIO</button>
    </div>
  </nav>

  <!-- HOME SECTION: all existing content -->
  <div id="homeSection">
    <!-- Admin Login (top-right corner) -->
    <div class="admin-controls">
      <button id="adminBtn" class="admin-btn" onclick="toggleAdmin()">Admin</button>
      <button class="edit-profile-btn admin-only" onclick="openProfileEditor()" style="display:none;">Edit Profile</button>
    </div>

    <!-- Admin Password Modal -->
    <div class="modal" id="adminModal">
      <div class="modal-content">
        <h3>Admin Login</h3>
        <input type="password" id="adminPassword" placeholder="Enter password" class="form-input">
        <div class="form-buttons">
          <button onclick="loginAdmin()" class="save-btn">Login</button>
          <button onclick="closeAdminModal()" class="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Profile Editor Modal -->
    <div class="modal" id="profileModal">
      <div class="modal-content modal-large">
        <h3>Edit Profile</h3>
        <input type="text" id="editName" placeholder="Your Name" class="form-input">
        <input type="text" id="editTitle" placeholder="Title (e.g., Student · Developer)" class="form-input">
        <input type="text" id="editLocation" placeholder="Location" class="form-input">
        <textarea id="editBio" placeholder="About me / Bio (optional)" class="form-textarea"></textarea>
        <input type="text" id="editAvatar" placeholder="Avatar Letter (1 character)" class="form-input" maxlength="1">
        <input type="url" id="editWebsite" placeholder="Website URL (optional)" class="form-input">
        <input type="text" id="editInterests" placeholder="Interests (comma separated, optional)" class="form-input">
        <div class="form-buttons">
          <button onclick="saveProfile()" class="save-btn">Save Profile</button>
          <button onclick="closeProfileModal()" class="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Edit Item Modal -->
    <div class="modal" id="editItemModal">
      <div class="modal-content modal-large">
        <h3>Edit Item</h3>
        <input type="hidden" id="editItemId">
        <input type="text" id="editItemName" placeholder="Item name" class="form-input">
        <input type="text" id="editItemPrice" placeholder="Price (e.g., $50)" class="form-input">
        <input type="url" id="editItemLink" placeholder="Link (optional)" class="form-input">
        <input type="url" id="editItemImage" placeholder="Image URL (optional)" class="form-input">
        <select id="editItemTag" class="form-select">
          <!-- Populated dynamically from tags.js -->
        </select>
        <textarea id="editItemInfo" placeholder="Info / Details (optional)" class="form-textarea"></textarea>
        
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-primary);">
          <input type="checkbox" id="editItemPrivate">
          🔒 Private (Admin only)
        </label>
        
        <div class="form-buttons">
          <button onclick="saveItemEdit()" class="save-btn">Save Changes</button>
          <button onclick="closeEditItemModal()" class="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Info Modal -->
    <div class="modal" id="infoModal">
      <div class="modal-content">
        <div class="info-header">
          <h3 id="infoItemName">Item Info</h3>
          <button class="modal-close" onclick="closeInfoModal()">×</button>
        </div>
        <div id="infoContent" class="info-content">
          No info available.
        </div>
      </div>
    </div>

    <!-- Comments Modal -->
    <div class="modal" id="commentsModal">
      <div class="modal-content modal-large">
        <div class="info-header">
          <h3 id="commentsItemName">Comments</h3>
          <button class="modal-close" onclick="closeCommentsModal()">×</button>
        </div>
        <div id="commentsContent" class="comments-list">
          <p style="color: #666;">No comments yet.</p>
        </div>
      </div>
    </div>

    <!-- Add Comment Modal -->
    <div class="modal" id="addCommentModal">
      <div class="modal-content">
        <h3>Add Comment</h3>
        <input type="hidden" id="commentItemId">
        <input type="text" id="commentAuthor" placeholder="Your name" class="form-input">
        <textarea id="commentText" placeholder="Write your comment..." class="form-textarea"></textarea>
        <div class="form-buttons">
          <button onclick="submitComment()" class="save-btn">Post Comment</button>
          <button onclick="closeAddCommentModal()" class="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Profile Section -->
    <header class="profile-section">
      <div class="profile-container">
        <div class="profile-avatar">
          <div class="avatar-circle" id="avatarCircle">U</div>
        </div>
        <div class="profile-info">
          <h1 class="profile-name" id="profileName">Your Name</h1>
          <p class="profile-title" id="profileTitle">Student · Developer</p>
          <p class="profile-location" id="profileLocation">📍 Bettendorf, IA</p>
          <p class="profile-bio" id="profileBio" style="display:none;"></p>
          <div class="profile-meta" id="profileMeta" style="display:none;">
            <a href="#" id="profileWebsite" target="_blank" class="profile-link" style="display:none;">🔗 Website</a>
            <p class="profile-interests" id="profileInterests" style="display:none;"></p>
          </div>
        </div>
      </div>
    </header>

    <!-- Wishlist Section -->
    <main class="wishlist-section">
      <div class="section-header">
        <h2>Wishlist</h2>
        <button class="add-btn admin-only" onclick="toggleAddForm()" style="display:none;">+ Add Item</button>
      </div>

      <!-- Filter Controls -->
      <div class="filter-controls">
        <div class="filter-group">
          <button class="filter-btn active" onclick="filterByPrice('all')">All Prices</button>
          <button class="filter-btn" onclick="filterByPrice('under50')">Under $50</button>
          <button class="filter-btn" onclick="filterByPrice('50to100')">$50-$100</button>
          <button class="filter-btn" onclick="filterByPrice('over100')">Over $100</button>
        </div>
        <div class="filter-group" id="tagFilterGroup">
          <!-- Populated dynamically from tags.js -->
        </div>
      </div>

      <!-- Add Item Form -->
      <div class="add-form" id="addForm">
        <input type="text" id="itemName" placeholder="Item name" class="form-input">
        <input type="text" id="itemPrice" placeholder="Price (e.g., $50)" class="form-input">
        <input type="url" id="itemLink" placeholder="Link (optional)" class="form-input">
        <input type="url" id="itemImage" placeholder="Image URL (optional)" class="form-input">
        <select id="itemTag" class="form-select">
          <!-- Populated dynamically from tags.js -->
        </select>
        <textarea id="itemInfo" placeholder="Info / Details (optional)" class="form-textarea"></textarea>
        
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-primary);">
          <input type="checkbox" id="itemPrivate">
          🔒 Private (Admin only)
        </label>
        
        <div class="form-buttons">
          <button onclick="addItem()" class="save-btn">Save</button>
          <button onclick="toggleAddForm()" class="cancel-btn">Cancel</button>
        </div>
      </div>

      <!-- Wishlist Grid -->
      <div class="wishlist-grid" id="wishlistGrid"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://www.perplexity.ai" target="_blank" class="footer-link">
        <span class="footer-text">Built with</span>
        <img src="perplexity.png" alt="Perplexity" class="perplexity-logo">
        <span class="footer-brand">Perplexity</span>
      </a>
    </footer>
  </div><!-- /homeSection -->

  <!-- PORTFOLIO SECTION -->
  <main class="portfolio-section" id="portfolioSection" style="display:none;">
    <div class="section-header">
      <h2>Portfolio</h2>
    </div>
    <div class="portfolio-grid">
      <div class="portfolio-item">
        <div class="portfolio-image-placeholder">Artwork 1</div>
      </div>
      <div class="portfolio-item">
        <div class="portfolio-image-placeholder">Artwork 2</div>
      </div>
      <div class="portfolio-item">
        <div class="portfolio-image-placeholder">Artwork 3</div>
      </div>
      <div class="portfolio-item">
        <div class="portfolio-image-placeholder">Artwork 4</div>
      </div>
      <div class="portfolio-item">
        <div class="portfolio-image-placeholder">Artwork 5</div>
      </div>
    </div>
  </main>

  <!-- Load tags first -->
  <script src="tags.js"></script>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, onValue, set, push, remove, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCKro17up49WahehhAxtdGCJ0ysuCbF8eg",
      authDomain: "aaronart-78d42.firebaseapp.com",
      databaseURL: "https://aaronart-78d42-default-rtdb.firebaseio.com", // make sure this matches your DB URL
      projectId: "aaronart-78d42",
      storageBucket: "aaronart-78d42.firebasestorage.app",
      messagingSenderId: "1022676254887",
      appId: "1:1022676254887:web:8de175e0d928b5d0b61b82",
      measurementId: "G-9J3MJHKBEY"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db;
    window.dbRef = ref;
    window.dbSet = set;
    window.dbPush = push;
    window.dbRemove = remove;
    window.dbUpdate = update;

    // Build tag filters and dropdowns from tags.js
    window.buildTagUI = function() {
      const tags = window.WISHLIST_TAGS || [];
      
      const tagFilterGroup = document.getElementById('tagFilterGroup');
      tagFilterGroup.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active';
      allBtn.textContent = 'All Tags';
      allBtn.addEventListener('click', () => filterByTag('all'));
      tagFilterGroup.appendChild(allBtn);

      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = tag.emoji + ' ' + tag.name;
        btn.addEventListener('click', () => filterByTag(tag.name));
        tagFilterGroup.appendChild(btn);
      });
      
      const itemTagSelect = document.getElementById('itemTag');
      itemTagSelect.innerHTML = '<option value="">No Tag</option>';
      tags.forEach(tag => {
        const option = document.createElement('option');
        option.value = tag.name;
        option.textContent = tag.emoji + ' ' + tag.name;
        itemTagSelect.appendChild(option);
      });
      
      const editItemTagSelect = document.getElementById('editItemTag');
      editItemTagSelect.innerHTML = '<option value="">No Tag</option>';
      tags.forEach(tag => {
        const option = document.createElement('option');
        option.value = tag.name;
        option.textContent = tag.emoji + ' ' + tag.name;
        editItemTagSelect.appendChild(option);
      });
    };

    window.buildTagUI();

    // Load profile
    const profileRef = ref(db, 'profile');
    onValue(profileRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('profileName').textContent = data.name || 'Your Name';
        document.getElementById('avatarCircle').textContent = data.avatar || 'U';
        document.getElementById('profileTitle').textContent = data.title || 'Student · Developer';
        document.getElementById('profileLocation').textContent = '📍 ' + (data.location || 'Bettendorf, IA');
        
        const bioEl = document.getElementById('profileBio');
        if (data.bio) {
          bioEl.textContent = data.bio;
          bioEl.style.display = 'block';
        } else {
          bioEl.style.display = 'none';
        }
        
        const websiteEl = document.getElementById('profileWebsite');
        if (data.website) {
          websiteEl.href = data.website;
          websiteEl.style.display = 'inline-block';
          document.getElementById('profileMeta').style.display = 'block';
        } else {
          websiteEl.style.display = 'none';
        }
        
        const interestsEl = document.getElementById('profileInterests');
        if (data.interests) {
          interestsEl.textContent = '💡 ' + data.interests;
          interestsEl.style.display = 'block';
          document.getElementById('profileMeta').style.display = 'block';
        } else {
          interestsEl.style.display = 'none';
        }
      }
    });

    // Load wishlist items
    const wishlistRef = ref(db, 'wishlist');
    onValue(wishlistRef, (snapshot) => {
      const grid = document.getElementById('wishlistGrid');
      grid.innerHTML = '';
      
      const data = snapshot.val();
      window.wishlistData = data || {};
      
      if (data) {
        Object.keys(data).forEach(key => {
          const item = data[key];
          renderItem(key, item);
        });
      }
    });

    window.renderItem = function(id, item) {
      const grid = document.getElementById('wishlistGrid');
      const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
      
      if (item.isPrivate && !isAdmin) {
        return;
      }
      
      const itemDiv = document.createElement('div');
      itemDiv.className = 'wishlist-item';
      itemDiv.dataset.id = id;
      itemDiv.dataset.price = item.price || '';
      itemDiv.dataset.tag = item.tag || '';
      
      const isChecked = item.checked || false;
      const hasInfo = item.info && item.info.trim() !== '';
      const hasImage = item.image && item.image.trim() !== '';
      const hasTag = item.tag && item.tag.trim() !== '';
      const commentCount = item.comments ? Object.keys(item.comments).length : 0;
      
      let html = '';
      
      if (hasImage) {
        html += `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" class="item-image" onerror="this.style.display='none'">`;
      }
      
      if (item.isPrivate && isAdmin) {
        html += '<div style="margin-bottom: 8px;"><span style="background: #6366f1; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.75em; font-weight: 600;">🔒 PRIVATE</span></div>';
      }
      
      if (hasTag) {
        const tags = window.WISHLIST_TAGS || [];
        const tagObj = tags.find(t => t.name === item.tag);
        const emoji = tagObj ? tagObj.emoji : '';
        html += `<div class="item-tags"><span class="item-tag">${emoji} ${escapeHtml(item.tag)}</span></div>`;
      }
      
      html += `
        <div class="item-header">
          <label class="checkbox-container">
            <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${id}', this.checked)">
            <span class="checkmark"></span>
          </label>
          <h3 class="item-name ${isChecked ? 'checked' : ''}">${escapeHtml(item.name)}</h3>
          <button class="delete-btn admin-only" onclick="deleteItem('${id}')" style="display:${isAdmin ? 'block' : 'none'};">×</button>
        </div>
      `;
      
      if (item.price) {
        html += `<p class="item-price">${escapeHtml(item.price)}</p>`;
        
        if (item.priceHistory && item.priceHistory.length > 1) {
          const original = parseFloat(item.priceHistory[0].price.replace(/[^0-9.]/g, ''));
          const current = parseFloat(item.price.replace(/[^0-9.]/g, ''));
          
          if (current < original) {
            const savings = (original - current).toFixed(2);
            html += `<span class="price-savings">💰 $${savings} off original!</span>`;
          } else if (current > original) {
            const increase = (current - original).toFixed(2);
            html += `<span class="price-increase">📈 +$${increase} from original</span>`;
          }
        }
      }
      
      html += '<div class="item-actions">';
      if (item.link) {
        html += `<a href="${escapeHtml(item.link)}" target="_blank" class="item-link">View</a>`;
      }
      if (hasInfo) {
        html += `<a href="javascript:void(0)" onclick="openInfo('${id}')" class="item-link info-link">Info</a>`;
      }
      html += `<a href="javascript:void(0)" onclick="openComments('${id}')" class="item-link comment-link">Comments ${commentCount > 0 ? '(' + commentCount + ')' : ''}</a>`;
      html += `<a href="javascript:void(0)" onclick="openAddComment('${id}')" class="item-link add-comment-link">Add Comment</a>`;
      if (isAdmin) {
        html += `<a href="javascript:void(0)" onclick="openEditItem('${id}')" class="item-link edit-link admin-only">Edit</a>`;
      }
      html += '</div>';
      
      itemDiv.innerHTML = html;
      grid.appendChild(itemDiv);
    };
  </script>

  <script src="script.js"></script>
</body>
</html>
